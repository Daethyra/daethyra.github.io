<!DOCTYPE html>
<html>
<head>
    <title>Daethyra's Blog</title>
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self';
                script-src 'self' 'unsafe-inline';
                style-src 'self' 'unsafe-inline';
                img-src 'self' data: https:;
                frame-src 'self' https://klipy.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">

    <style>
        /* Critical CSS to prevent white flash */
        html, body {
            background: black !important;
            margin: 0 !important;
            overflow: hidden !important;
        }
        canvas {
            background: black;
        }

        /* Main CSS */
        body {
            font-family: system-ui, sans-serif;
            color: #FFFFFF;
        }

        /* Matrix Canvas */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            background: linear-gradient(rgba(245, 169, 184, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(91, 206, 250, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            /* will-change: transform; */
        }

        /* Content Overlay System */
        .content-wrapper {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Scrollable Content */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 0;
        }

        /* Layout Structure */
        .content-column {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Section Styling */
        .section {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(91, 206, 250, 0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 4px;
        }

        .banner {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            border: 1px solid rgba(245, 169, 184, 0.3);
            background: rgba(0, 0, 0, 0.85);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(245, 169, 184, 0.2);
            position: relative;
            overflow: hidden;
        }

        .banner h2 {
            color: #FFFFFF;
        }

        .banner p {
            color: #5BCEFA;
        }

        .section h3 {
            color: #F5A9B8;
            margin-top: 0;
        }

        /* Link Styling */
        a.link-block {
            display: block;
            padding: 1rem;
            margin: 0.5rem 0;
            color: #F5A9B8;
            border: 1px solid rgba(245, 169, 184, 0.15);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        a.link-block:hover {
            background: rgba(245, 169, 184, 0.06);
            border-color: rgba(245, 169, 184, 0.4);
            transform: translateX(5px);
        }

        .link-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .link-title {
            flex: 1;
            color: #F5A9B8;
        }

        .link-description {
            color: #5BCEFA;
            font-size: 0.85em;
            text-align: right;
            padding-left: 1rem;
            max-width: 60%;
        }

        .dropdown-container {
            position: relative;
            margin: 0.5rem 0;
        }

        .dropdown-button {
            width: 100%;
            padding: 1rem;
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(91, 206, 250, 0.15);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 1em;
            margin: 0.5rem 0;
            border-radius: 0;
            color: #FFFFFF;
        }

        .dropdown-button:hover {
            background: rgba(245, 169, 184, 0.06);
            border-color: rgba(245, 169, 184, 0.3);
            transform: translateX(5px);
        }

        .dropdown-button::after {
            content: "▼";
            font-size: 0.8em;
            transition: transform 0.2s ease;
            color: #5BCEFA;
        }

        .dropdown-button.expanded::after {
            transform: rotate(180deg);
        }

        .dropdown-content {
            display: none;
            padding-left: 1rem;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-content a {
            transform: translateX(10px);
            margin: 0.5rem 0;
        }

        .button-title {
            color: #F5A9B8;
            font-weight: bold;
            display: block;
            flex: 1;
        }

        .button-description {
            color: #5BCEFA;
            font-size: 0.9em;
            text-align: right;
            font-weight: normal;
            display: block;
            margin-top: 0.25rem;
            margin-right: 1rem;
        }

        /* No-Script Warning */
        .noscript-warning {
            position: fixed;
            top: 0;
            width: 100%;
            background: #330000;
            color: #ff4444;
            padding: 1rem;
            text-align: center;
            z-index: 9999;
        }

        /* Tor Browser Fallback */
        @media (pointer: coarse) {
            .dropdown-content {
                display: block !important;
            }
        }

        /* Navigation */
        .nav-menu {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(245, 169, 184, 0.15);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(91, 206, 250, 0.05);
        }

        .nav-menu a {
            color: #F5A9B8;
            text-decoration: none;
            font-size: 1.1em;
            transition: color 0.2s ease;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
            /* text-shadow: 0 0 20px #fff !important; // forces white glow */
        }

        .nav-menu a:hover {
            color: #5BCEFA;
            /* text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); */
        }

        /* Post Previews */
        .post-preview {
            transition: border-color 0.3s ease;
        }

        .post-preview:hover {
            border-color: #F5A9B8;
        }

        .post-preview h3 a {
            color: #F5A9B8;
            text-decoration: none;
            cursor: pointer;
        }

        .post-preview h3 a:hover {
            color: #5BCEFA;
        }

        .post-preview small {
            color: #5BCEFA;
            font-size: 0.85em;
        }

        .post-preview .read-more {
            color: #5BCEFA;
            text-decoration: none;
            font-size: 0.9em;
            cursor: pointer;
        }

        .post-preview .read-more:hover {
            color: #F5A9B8;
            text-decoration: underline;
        }

        /* Tags in post previews */
        .post-tags {
            margin-top: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .post-tags .tag {
            background: rgba(245, 169, 184, 0.12);
            border: 1px solid rgba(245, 169, 184, 0.2);
            padding: 0.2rem 0.7rem;
            border-radius: 12px;
            font-size: 0.75em;
            color: #F5A9B8;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .post-tags .tag:hover {
            background: rgba(245, 169, 184, 0.2);
            border-color: #5BCEFA;
            color: #5BCEFA;
        }

        /* Full Post */
        .full-post {
            border-color: #F5A9B8;
        }

        .full-post .back-link {
            color: #5BCEFA;
            text-decoration: none;
            display: inline-block;
            margin-top: 1.5rem;
            cursor: pointer;
        }

        .full-post .back-link:hover {
            color: #F5A9B8;
            text-decoration: underline;
        }

        /* Tag Cloud / Filter Bar */
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            border: 1px solid rgba(91, 206, 250, 0.1);
            justify-content: center;
            width: fit-content;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .tag-cloud .tag-filter {
            background: rgba(91, 206, 250, 0.08);
            border: 1px solid rgba(91, 206, 250, 0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 16px;
            font-size: 0.85em;
            color: #5BCEFA;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.75);
        }

        .tag-cloud .tag-filter:hover {
            background: rgba(245, 169, 184, 0.15);
            border-color: #F5A9B8;
            color: #F5A9B8;
        }

        .tag-cloud .tag-filter.active {
            background: rgba(245, 169, 184, 0.2);
            border-color: #F5A9B8;
            color: #FFFFFF;
        }

        .tag-cloud .tag-clear {
            background: transparent;
            border: none;
            color: #5BCEFA;
            cursor: pointer;
            font-size: 0.85em;
            padding: 0.3rem 0.5rem;
            transition: color 0.2s;
        }

        .tag-cloud .tag-clear:hover {
            color: #F5A9B8;
        }

        /* Pagination */
        #pagination-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding: 1rem 0;
            border-top: 1px solid rgba(91, 206, 250, 0.15);
        }

        .nav-button {
            background: transparent;
            border: 1px solid #F5A9B8;
            color: #F5A9B8;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95em;
            transition: all 0.2s ease;
            border-radius: 4px;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.75);
            
        }

        .nav-button:hover {
            background: rgba(245, 169, 184, 0.1);
            border-color: #5BCEFA;
            color: #5BCEFA;
        }

        .nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #page-indicator {
            color: #5BCEFA;
            font-size: 0.95em;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.3rem 1rem;
            border-radius: 16px;
            border: 1px solid rgba(91, 206, 250, 0.15);
        }

        /* RSS Link */
        .rss-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #5BCEFA;
            text-decoration: none;
            font-size: 0.85em;
            margin-top: 0.5rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid rgba(91, 206, 250, 0.2);
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .rss-link:hover {
            border-color: #F5A9B8;
            color: #F5A9B8;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.75);
        }

        /* About */
        .about-content {
            color: #FFFFFF;
            line-height: 1.6;
        }
        .about-content a {
            color: #F5A9B8;
            text-decoration: none;
        }
        .about-content a:hover {
            color: #5BCEFA;
            text-decoration: underline;
        }

        /* Scrollbar */
        .scroll-content::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
        }
        .scroll-content::-webkit-scrollbar-thumb {
            background: #F5A9B8;
            border-radius: 3px;
        }
        .scroll-content::-webkit-scrollbar-thumb:hover {
            background: #5BCEFA;
        }
        
        /* Gif Control */
        .gif-row {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }

        .gif-row img {
            max-width: 30%;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <noscript>
        <div class="noscript-warning">

    <canvas id="matrix"></canvas>

    <script>
        // matrix rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン红橙黄绿蓝紫黑白粉灰爱梦光心龙禅智美静勇真生星月风云火水山林花雪0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@%&*()[]{}<>";
        const charArray = chars.split('');
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.floor(Math.random() * canvas.height / fontSize);
        }

        // rain state for tab switching / performance
        let animationId = null;
        let timeoutId = null;
        let isRainRunning = true;

        // Detect if the device is mobile (touchscreen or small screen)
        const isMobile = window.innerWidth < 768 || window.matchMedia('(pointer: coarse)').matches;
        const FRAME_DELAY = isMobile ? 50 : 24;

        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0.06)');   // top: light fade
            gradient.addColorStop(0.7, 'rgba(0, 0, 0, 0.08)'); // middle: medium fade
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.25)');   // bottom: strong fade

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + "px 'Courier New', monospace";
            ctx.textAlign = 'start';

            for (let i = 0; i < drops.length; i++) {
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                if (Math.random() > 0.975) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                } else {
                    const pick = Math.random();
                    ctx.fillStyle = pick < 0.6 ? '#F5A9B8' : '#5BCEFA';
                }

                ctx.fillText(char, x, y);

                if (y > canvas.height) {
                    drops[i] = 0;
                } else {
                    drops[i]++;
                }
            }

            // only schedule the next frame if the rain is still running
            if (isRainRunning) {
                timeoutId = setTimeout(() => {
                    animationId = requestAnimationFrame(draw);
                }, FRAME_DELAY);
            }
        }

        function stopRain() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            isRainRunning = false;
        }

        function startRain() {
            if (!isRainRunning) {
                // clear any stale timers/frames before restarting
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                isRainRunning = true;
                draw(); // restart the loop
            }
        }

        // stop rain when tab is hidden (switching tabs, minimizing browser)
        // resume when tab becomes visible again
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopRain();
            } else {
                startRain();
            }
        });

        // Start the rain initially
        draw();

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const newColumns = Math.floor(canvas.width / fontSize);
            if (newColumns > drops.length) {
                for (let i = drops.length; i < newColumns; i++) {
                    drops[i] = Math.floor(Math.random() * canvas.height / fontSize);
                }
            } else if (newColumns < drops.length) {
                drops.length = newColumns;
            }
        });

        // drop down toggle
        function toggleDropdown(event) {
            const button = event.currentTarget;
            const container = button.closest('.dropdown-container');
            const content = container.querySelector('.dropdown-content');

            button.classList.toggle('expanded');
            content.classList.toggle('show');
        }

        // blog data w/ tags :3
        const posts = [
            {
                id: 1,
                title: "Why create a blog?",
                date: "2026-07-19 | 7:44 PM",
                excerpt: "Building a website has been something on my to-do list for a long, long time.",
                tags: [],
                content: `
                    <p>honestly? i'm pretty proud w/ how it turned out. in the future, i'd like to post about my personal projects, and separately, share my thoughts on different technologies so that when someone asks me a question in real life, i can point them to this blog. :3</p>
                    <img src="assets/speed yeah.gif" alt="IShowSpeed yeah react gif" loading="lazy" style="display: block; margin-left: auto; margin-right: auto; max-width: 100%; height: auto;">
                    <p></p>
                `
            },
            // {
            //     id: 2,
            //     title: "second example",
            //     date: "2026-07-21(9+10=21)",
            //     excerpt: "i'm woke and based idk",
            //     tags: ["woke and based", "personal"],
            //     content: `
            //         <p>erm actually</p>
            //         <p>jk i'm true. i'm really true.</p>
            //     `
            // },

        ];

        // render stuff idk what i'm doing tbh
        let currentPage = 1;
        let activeTags = [];
        const postsPerPage = 5;

        function getFilteredPosts() {
            if (activeTags.length === 0) {
                return posts;
            }
            // AND logic; post must have ALL active tags
            return posts.filter(p => {
                if (!p.tags) return false;
                return activeTags.every(tag => p.tags.includes(tag));
            });
        }

        function getAllTags() {
            const tagSet = new Set();
            posts.forEach(p => {
                if (p.tags) {
                    p.tags.forEach(t => tagSet.add(t));
                }
            });
            return Array.from(tagSet).sort();
        }

        // clean helper to update URL without reloading
        function updateURL(page, tags, postId, view) {
            const params = new URLSearchParams();
            if (page && page > 1) params.set('page', page);
            if (tags && tags.length > 0) params.set('tags', tags.join(','));
            if (postId) params.set('post', postId);
            if (view) params.set('view', view);
            const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newUrl);
        }

        function toggleTagFilter(tag) {
            const index = activeTags.indexOf(tag);
            if (index === -1) {
                activeTags.push(tag);
            } else {
                activeTags.splice(index, 1);
            }
            currentPage = 1;
            renderPage(currentPage);
        }

        function clearTagFilter() {
            activeTags = [];
            currentPage = 1;
            renderPage(currentPage);
        }

        function renderPage(page) {
            const container = document.getElementById('page-container');
            const pagination = document.getElementById('pagination-controls');

            const filtered = getFilteredPosts();
            const start = (page - 1) * postsPerPage;
            const end = start + postsPerPage;
            const pagePosts = filtered.slice(start, end);

            let html = '';

            // tag cloud
            const allTags = getAllTags();
            if (allTags.length > 0) {
                html += `
                    <div class="tag-cloud">
                        ${allTags.map(tag => `
                            <span class="tag-filter ${activeTags.includes(tag) ? 'active' : ''}" onclick="toggleTagFilter('${tag}')">#${tag}</span>
                        `).join('')}
                        ${activeTags.length > 0 ? `<span class="tag-clear" onclick="clearTagFilter()">✕ clear</span>` : ''}
                    </div>
                `;
            }

            // intro block | only on page 1 with no tag filter
            if (page === 1 && activeTags.length === 0) {
                html += `
                    <section class="section intro">
                        <h3>Welcome <3</h3>
                        <p>My corner is cyberspace. No idea what I'll put here yet; mayhaps I'll share my projects here.</p>
                        <div class="gif-row">
                            <img src="assets/paprika flying princess.gif" alt="Paprika Flying Princess" loading="lazy">
                            <img src="assets/paprika flying princess.gif" alt="Paprika Flying Princess" loading="lazy">
                            <img src="assets/paprika flying princess.gif" alt="Paprika Flying Princess" loading="lazy">
                        </div>
                        
                    </section>
                `;
            }

            // filter status
            if (activeTags.length > 0) {
                html += `
                    <p style="color: #5BCEFA; font-size: 0.9em; text-align: center; margin-bottom: 1rem;">
                        Showing posts with tags: <span style="color: #F5A9B8;">${activeTags.map(t => '#' + t).join(' + ')}</span>
                    </p>
                `;
            }

            // post previews
            if (pagePosts.length === 0) {
                html += `
                    <section class="section">
                        <p style="color: #5BCEFA; text-align: center;">No posts found with all selected tags${activeTags.length > 0 ? ` (${activeTags.map(t => '#' + t).join(' + ')})` : ''}.</p>
                    </section>
                `;
            } else {
                pagePosts.forEach(post => {
                    const tagHtml = post.tags && post.tags.length > 0
                        ? `<div class="post-tags">${post.tags.map(t => `<span class="tag" onclick="toggleTagFilter('${t}')">#${t}</span>`).join('')}</div>`
                        : '';
                    html += `
                        <article class="section post-preview">
                            <h3><a onclick="showPost(${post.id})">${post.title}</a></h3>
                            <p><small>${post.date}</small></p>
                            <p>${post.excerpt}</p>
                            ${tagHtml}
                            <a class="read-more" onclick="showPost(${post.id})">Read more →</a>
                        </article>
                    `;
                });
            }

            container.innerHTML = html;
            pagination.style.display = 'flex';

            // pagination state
            const totalPages = Math.ceil(filtered.length / postsPerPage) || 1;
            document.getElementById('page-indicator').textContent = `Page ${page} of ${totalPages}`;
            document.getElementById('prev-page').style.display = page === 1 ? 'none' : 'inline-block';
            document.getElementById('next-page').style.display = page >= totalPages ? 'none' : 'inline-block';

            // update URL to reflect current state
            updateURL(page, activeTags, null, null);
        }

        function showPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;

            const container = document.getElementById('page-container');
            const pagination = document.getElementById('pagination-controls');

            const tagHtml = post.tags && post.tags.length > 0
                ? `<div class="post-tags">${post.tags.map(t => `<span class="tag" onclick="toggleTagFilter('${t}')">#${t}</span>`).join('')}</div>`
                : '';

            container.innerHTML = `
                <article class="section full-post">
                    <h3>${post.title}</h3>
                    <p><small>${post.date}</small></p>
                    ${tagHtml}
                    <br>
                    ${post.content}
                    <br>
                    <a class="back-link" onclick="renderPage(${currentPage})">← Back to posts</a>
                </article>
            `;

            pagination.style.display = 'none';

            // update URL to reflect current post
            updateURL(null, null, id, null);
        }

        // RSS creator

            const container = document.getElementById('page-container');
            const pagination = document.getElementById('pagination-controls');

            const blogTitle = document.getElementById('blog-title').textContent;
            const blogDesc = document.getElementById('blog-desc').textContent;
            const blogUrl = window.location.href;

            let items = posts.map(p => {
                const title = p.title;
                const link = blogUrl + `?post=${p.id}`;
                const pubDate = new Date(p.date + 'T00:00:00Z').toUTCString();
                const content = p.content.replace(/<p>/g, '<p>').replace(/<\/p>/g, '</p>');
                return `
                    <item>
                        <title>${title}</title>
                        <link>${link}</link>
                        <guid isPermaLink="false">${p.id}</guid>
                        <pubDate>${pubDate}</pubDate>
                        <description><![CDATA[${p.excerpt}]]></description>
                        ${p.tags ? `<category>${p.tags.join('</category><category>')}</category>` : ''}
                    </item>
                `;
            }).join('');

            const rssXml = `<?xml version="1.0" encoding="UTF-8"?>
            <rss version="2.0">
                <channel>
                    <title>${blogTitle}</title>
                    <description>${blogDesc}</description>
                    <link>${blogUrl}</link>
                    <language>en-us</language>
                    ${items}
                </channel>
            </rss>`;

            container.innerHTML = `
                <section class="section">
                    <h3>RSS Feed</h3>
                    <p style="color: #5BCEFA;">Copy the URL below and paste it into your RSS reader.</p>
                    <br>
                    <div style="background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 4px; border: 1px solid rgba(91,206,250,0.15); overflow-wrap: break-word; word-break: break-all;">
                        <code style="color: #F5A9B8; font-size: 0.9em;">data:application/rss+xml;charset=utf-8,${encodeURIComponent(rssXml)}</code>
                    </div>
                    <br>
                    <p style="color: #5BCEFA; font-size: 0.9em;">Or use this feed URL if you're serving this file from a real domain:</p>

            `;

            pagination.style.display = 'none';

            console.log('RSS feed generated. Serve this XML at /feed.xml for proper RSS discovery.');
        }

        // pagination
        document.getElementById('prev-page').addEventListener('click', function() {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
            }
        });

        document.getElementById('next-page').addEventListener('click', function() {
            const filtered = getFilteredPosts();
            const totalPages = Math.ceil(filtered.length / postsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderPage(currentPage);
            }
        });

        // routing (supports ?post=id, ?tags=tag1,tag2, ?page=n, ?view=resources|about)
        function parseURL() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post');
            const tagsParam = params.get('tags');
            const pageParam = params.get('page');
            const viewParam = params.get('view');

            if (postId) {
                const id = parseInt(postId);
                const post = posts.find(p => p.id === id);
                if (post) {
                    showPost(id);
                    return true;
                }
            }

            if (viewParam === 'resources') {
                showResources();
                return true;
            }

            if (viewParam === 'about') {
                showAbout();
                return true;
            }

            if (tagsParam) {
                const tags = tagsParam.split(',').map(t => t.trim());
                activeTags = tags;
            }

            if (pageParam) {
                currentPage = parseInt(pageParam) || 1;
            }

            renderPage(currentPage);
            return true;
        }

        // start ts :3
        if (!parseURL()) {
            renderPage(1);
        }
